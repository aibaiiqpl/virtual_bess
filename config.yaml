modbus:
  address: ":502"

iec61850:
  enabled: false
  address: ":102"
  ied_name: ""
  goose:
    enabled: false
    interface: ""
    appid: "0100"
    dst_mac: "01-0C-CD-01-01-00"
    vlan_priority: 4
    vlan_id: 0
    disable_vlan: false
    interval_ms: 1000
    time_allowed_to_live_ms: 5000
  devices:
    - pcs_slave_id: 1
      address: ":102"
      ied_name: "pcs01"
    - pcs_slave_id: 2
      address: ":1102"
      ied_name: "pcs02"

# 日本大阪场景：60Hz 电网。
grid:
  # 关口表所在侧"相电压" V。现场关口电压等级 6.6kV 为线电压，
  # 仿真寄存器统一写相电压：6600 / √3 ≈ 3810.5 V。
  voltage: 3810.5
  frequency: 60                # 大阪属日本西部，标称频率 60Hz

pcs:
  # PCS AC 出口"相电压" V。现场 PCS 电压等级 500V 为线电压，
  # 仿真寄存器统一写相电压：500 / √3 ≈ 288.7 V。
  ac_voltage: 288.7

# 两套储能柜：每柜 1 PCS + 1 BMS（10 簇并联），无光伏。
# battery_voltage_full=1382 → 串数 round(1382/3.6)=384，单体≈3.3V 时 pack≈1267V，
# 对齐现场 BMS（单体 3.3V / 总电压 1268V）。每簇并联，簇电压≈pack 电压。
battery_units:
  - pcs_slave_id: 1
    bms_slave_id: 11
    rated_capacity_kwh: 5016
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1382
    cluster_count: 10
  - pcs_slave_id: 2
    bms_slave_id: 12
    rated_capacity_kwh: 5016
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1382
    cluster_count: 10

# 无光伏：必须显式置空。LoadConfig 以 DefaultConfig 为基底再 yaml.Unmarshal，
# 缺省 pv_units 键时不会清空默认值（默认含 1 台 PV slave 21），故须显式 []。
pv_units: []

# 站用/辅助负荷：辅助电表后挂的小负载（空调、热管理、控制电源等），约十几千瓦。
loads:
  - name: aux
    rated_power_kw: 16

# 电表：
#   - 31 main：6.6kV 关口表（PCC），is_main 聚合全部 PCS + 站用辅助负荷。
#   - 32 aux ：500V 辅助/站用电表，本质是负载电表，计量站用辅助负荷 aux。
# 电压统一写相电压（线电压 / √3），pt_ratio=1 时寄存器即一次相电压（0.1V）。
meters:
  - slave_id: 31
    name: main
    is_main: true             # 关口表，聚合全部 PCS + 负荷
    voltage: 3810.5           # 6.6kV 线电压 → 相电压 3810.5V
    pt_ratio: 1
  - slave_id: 32
    name: aux                 # 辅助/站用电表（≈ 负载电表，计量站用辅助负荷）
    load_names: [aux]
    voltage: 288.7            # 500V 线电压 → 相电压 288.7V
    pt_ratio: 1

log:
  file: "logs/virtual_bess.log"
  level: "info"
  console: true

# 持久化：电表 forward/reverse 电度、电池 SOC/总充总放。
state:
  file: "state.json"
  interval: 15

timezone: "Asia/Tokyo"
