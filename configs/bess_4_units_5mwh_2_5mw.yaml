modbus:
  address: ":502"

iec61850:
  enabled: true
  # 每个端点显式小写 IED 名 pcs0N：emu 端 EMU{N} 的 PCS-IEC61850-MMS.csv 引用
  # pcs0NCTRL/pcs0NMEAS、共享 GOOSE 点表引用 pcs0NPIGO（对象引用大小写敏感）。
  # 留空会回退大写 PCS0N，与 emu 点表不匹配，导致遥控 ControlObjectClient_create 失败。
  devices:
    - pcs_slave_id: 1
      address: ":102"
      ied_name: "pcs01"
      goose:
        enabled: false
        interface: ""
        appid: "0100"
    - pcs_slave_id: 2
      address: ":1102"
      ied_name: "pcs02"
      goose:
        enabled: false
        interface: ""
        appid: "0101"
    - pcs_slave_id: 3
      address: ":2102"
      ied_name: "pcs03"
      goose:
        enabled: false
        interface: ""
        appid: "0102"
    - pcs_slave_id: 4
      address: ":3102"
      ied_name: "pcs04"
      goose:
        enabled: false
        interface: ""
        appid: "0103"

grid:
  voltage: 10000

pcs:
  ac_voltage: 720

battery_units:
  - pcs_slave_id: 1
    bms_slave_id: 11
    rated_capacity_kwh: 5000
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1400
    cluster_count: 12
  - pcs_slave_id: 2
    bms_slave_id: 12
    rated_capacity_kwh: 5000
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1400
    cluster_count: 12
  - pcs_slave_id: 3
    bms_slave_id: 13
    rated_capacity_kwh: 5000
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1400
    cluster_count: 12
  - pcs_slave_id: 4
    bms_slave_id: 14
    rated_capacity_kwh: 5000
    rated_power_kw: 2500
    initial_soc: 30.0
    soh: 100.0
    battery_voltage_full: 1400
    cluster_count: 12

pv_units: []
loads: []

meters:
  - slave_id: 31
    name: main
    is_main: true
    voltage: 15000
    pt_ratio: 150
  - slave_id: 36
    name: pcs_all
    pcs_slave_ids: [1, 2, 3, 4]
    voltage: 800
    pt_ratio: 1

log:
  file: "logs/virtual_bess_4_units.log"
  level: "info"
  console: true

state:
  file: "state_4_units.json"
  interval: 15

timezone: "Europe/Lisbon"
