          path: libiec61850/lib/linux_armv8/*.a
          retention-days: 30

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-15  # M1 runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Install mbedtls 2.28 from source
        run: |
          # Build mbedtls 2.28 for macOS (compatible with libiec61850 v1.6.1)
          git clone --depth 1 --branch v2.28.8 https://github.com/Mbed-TLS/mbedtls.git /tmp/mbedtls
          cd /tmp/mbedtls
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DENABLE_PROGRAMS=OFF \
                -DENABLE_TESTING=OFF \
                ..
          make -j$(sysctl -n hw.ncpu)

      - name: Clone libiec61850
        run: |
          git clone --depth 1 --branch ${{ env.LIBIEC61850_VERSION }} \
            https://github.com/mz-automation/libiec61850.git /tmp/libiec61850

      - name: Enable advanced features
        run: |
          cd /tmp/libiec61850
          sed -i '' 's/#define CONFIG_IEC61850_R_GOOSE 0/#define CONFIG_IEC61850_R_GOOSE 1/' config/stack_config.h
          sed -i '' 's/#define CONFIG_IEC61850_R_SMV 0/#define CONFIG_IEC61850_R_SMV 1/' config/stack_config.h
          sed -i '' 's/#define CONFIG_IEC61850_SNTP_CLIENT 0/#define CONFIG_IEC61850_SNTP_CLIENT 1/' config/stack_config.h
          sed -i '' 's/#define CONFIG_MMS_SUPPORT_TLS 0/#define CONFIG_MMS_SUPPORT_TLS 1/' config/stack_config.h

      - name: Debug - Verify mbedtls libraries
        run: |
          echo "=== mbedtls libraries ==="
          ls -lh /tmp/mbedtls/build/library/
          echo ""
          echo "=== Checking for symbols in libmbedtls.a ==="
          nm /tmp/mbedtls/build/library/libmbedtls.a | grep -i "mbedtls_ssl_config_init" || echo "Symbol not found!"

      - name: Build library
        run: |
          cd /tmp/libiec61850
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DWITH_MBEDTLS=1 \
                -DCONFIG_EXTERNAL_MBEDTLS_INCLUDE_PATH=/tmp/mbedtls/include \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DMBEDTLS_INCLUDE_DIR=/tmp/mbedtls/include \
                -DMBEDTLS_LIBRARY=/tmp/mbedtls/build/library/libmbedtls.a \
                -DMBEDX509_LIBRARY=/tmp/mbedtls/build/library/libmbedx509.a \
                -DMBEDCRYPTO_LIBRARY=/tmp/mbedtls/build/library/libmbedcrypto.a \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_PYTHON_BINDINGS=OFF \
                ..
          # Build only static libraries (hal and iec61850 targets)
          make -j$(sysctl -n hw.ncpu) hal iec61850

      - name: Copy library to workspace
        run: |
          mkdir -p libiec61850/lib/darwin_armv8
          cp /tmp/libiec61850/build/src/libiec61850.a libiec61850/lib/darwin_armv8/
          cp /tmp/libiec61850/build/hal/libhal.a libiec61850/lib/darwin_armv8/
          cp /tmp/mbedtls/build/library/libmbedtls.a libiec61850/lib/darwin_armv8/
          cp /tmp/mbedtls/build/library/libmbedx509.a libiec61850/lib/darwin_armv8/
          cp /tmp/mbedtls/build/library/libmbedcrypto.a libiec61850/lib/darwin_armv8/

      - name: Verify library
        run: |
          file libiec61850/lib/darwin_armv8/libiec61850.a
          ls -lh libiec61850/lib/darwin_armv8/libiec61850.a
          lipo -info libiec61850/lib/darwin_armv8/libiec61850.a

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Debug - Check libraries and symbols
        run: |
          echo "=== Library files ==="
          ls -lh libiec61850/lib/darwin_armv8/
          echo ""
          echo "=== Check for TLS symbols in libiec61850.a ==="
          nm libiec61850/lib/darwin_armv8/libiec61850.a | grep -i tls || echo "No TLS symbols found!"
          echo ""
          echo "=== Check config_darwinarmv8.go LDFLAGS ==="
          grep -A 10 'LDFLAGS' config_darwinarmv8.go
          echo ""
          echo "=== CMake cache for TLS/MBEDTLS ==="
          grep -i 'mbedtls\|tls' /tmp/libiec61850/build/CMakeCache.txt || echo "No mbedtls entries in CMakeCache"

      - name: Test Go build
        run: |
          go build -v ./...
          echo "Go build successful for darwin_armv8!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libiec61850-darwin-arm64
          path: libiec61850/lib/darwin_armv8/*.a
          retention-days: 30

  build-macos-amd64:
