  build-windows-amd64:
    name: Build Windows x64 (MinGW)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-binutils

      - name: Setup PATH
        shell: pwsh
        run: |
          $mingw = "C:\mingw64\bin"
          echo "$mingw" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MbedTLS
        shell: pwsh
        run: |
          git clone --depth 1 --branch v2.28.8 https://github.com/Mbed-TLS/mbedtls.git C:\mbedtls
          cmake `
            -S C:\mbedtls `
            -B C:\mbedtls\build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_PROGRAMS=OFF `
            -DENABLE_TESTING=OFF
          cmake --build C:\mbedtls\build

      - name: Clone libiec61850
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:LIBIEC61850_VERSION https://github.com/mz-automation/libiec61850.git C:\libiec61850

      - name: Install WinPcap developer pack (WpdPack) for L2 GOOSE/SMV
        shell: pwsh
        run: |
          $wpzip = "C:\WpdPack_4_1_2.zip"
          $url = "https://www.winpcap.org/install/bin/WpdPack_4_1_2.zip"
          Invoke-WebRequest -Uri $url -OutFile $wpzip -UseBasicParsing
          Expand-Archive -Path $wpzip -DestinationPath "C:\wpd_extract" -Force
          $wpd = Get-ChildItem "C:\wpd_extract" -Directory | Select-Object -First 1
          if (-not $wpd) { $wpd = New-Item -ItemType Directory -Path "C:\wpd_extract\WpdPack"; Get-Item "C:\wpd_extract\WpdPack" }
          $wpdPath = $wpd.FullName
          $dest = "C:\libiec61850\third_party\winpcap"
          New-Item -ItemType Directory -Path $dest -Force
          Copy-Item -Path "$wpdPath\Include" -Destination "$dest\Include" -Recurse -Force -ErrorAction Stop
          New-Item -ItemType Directory -Path "$dest\Lib" -Force
          if (Test-Path "$wpdPath\Lib\x64") {
            Copy-Item -Path "$wpdPath\Lib\x64\*" -Destination "$dest\Lib" -Force
          } else {
            Copy-Item -Path "$wpdPath\Lib\*" -Destination "$dest\Lib" -Force
          }
          if (-not (Test-Path "$dest\Lib\wpcap.lib")) { throw "wpcap.lib not found under $dest\Lib" }
          Write-Host "WinPcap developer pack installed; L2 GOOSE/SMV will be enabled."

      - name: Build libiec61850
        shell: pwsh
        run: |
          cmake `
            -S C:\libiec61850 `
            -B C:\libiec61850\build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCONFIG_IEC61850_L2_GOOSE=1 `
            -DCONFIG_IEC61850_L2_SMV=1 `
            -DCONFIG_IEC61850_R_GOOSE=1 `
            -DCONFIG_IEC61850_R_SMV=1 `
            -DCONFIG_IEC61850_SNTP_CLIENT=1 `
            -DWITH_MBEDTLS=1 `
            -DMBEDTLS_INCLUDE_DIR=C:\mbedtls\include `
            -DMBEDTLS_LIBRARY=C:\mbedtls\build\library\libmbedtls.a `
            -DMBEDX509_LIBRARY=C:\mbedtls\build\library\libmbedx509.a `
            -DMBEDCRYPTO_LIBRARY=C:\mbedtls\build\library\libmbedcrypto.a `
            -DBUILD_EXAMPLES=OFF
          cmake --build C:\libiec61850\build --target iec61850
          cmake --build C:\libiec61850\build --target hal

      - name: Copy libraries
        shell: pwsh
        run: |
          mkdir libiec61850\lib\win64 -Force
          copy C:\libiec61850\build\src\libiec61850.a libiec61850\lib\win64\
          copy C:\libiec61850\build\hal\libhal.a libiec61850\lib\win64\
          copy C:\mbedtls\build\library\libmbedtls.a libiec61850\lib\win64\
          copy C:\mbedtls\build\library\libmbedx509.a libiec61850\lib\win64\
          copy C:\mbedtls\build\library\libmbedcrypto.a libiec61850\lib\win64\
          copy C:\libiec61850\third_party\winpcap\Lib\wpcap.lib libiec61850\lib\win64\
          copy C:\libiec61850\third_party\winpcap\Lib\packet.lib libiec61850\lib\win64\
          dir libiec61850\lib\win64

      - name: Verify GOOSE/SV objects in library
        shell: pwsh
        run: |
          $env:Path = "C:\mingw64\bin;" + $env:Path
          $arList = ar t libiec61850\lib\win64\libiec61850.a 2>&1 | Out-String
          if ($arList -notmatch "goose_publisher") { Write-Error "goose_publisher object not found in libiec61850.a" }
          if ($arList -notmatch "sv_publisher") { Write-Error "sv_publisher object not found in libiec61850.a" }
          Write-Host "GOOSE/SV object files present in libiec61850.a"

      - name: Verify REQUIRED symbols exist (this is what matters)
        shell: pwsh
        run: |
          $env:Path = "C:\mingw64\bin;" + $env:Path
          $lib = "libiec61850\lib\win64\libiec61850.a"
          $nmOut = nm -g $lib 2>&1
          $nm = $nmOut | Out-String
          # Grep for mms/goose (case insensitive) to inspect what symbols are in the archive
          $nmOut | Select-String -Pattern "(?i)mms|goose" -AllMatches | ForEach-Object { Write-Host $_.Line }
          # With WpdPack installed, L2 GOOSE/SMV are enabled. Require full publisher symbols.
          if ($nm -notmatch "GoosePublisher_createEx" -and $nm -notmatch "_GoosePublisher_createEx") { throw "Missing symbol GoosePublisher_createEx in $lib (L2 GOOSE not compiled in)" }
          if ($nm -notmatch "SVPublisher_create" -and $nm -notmatch "_SVPublisher_create")          { throw "Missing symbol SVPublisher_create in $lib (L2 SMV not compiled in)" }
          Write-Host "OK: L2 publisher symbols present."

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Test Go build
        shell: pwsh
        env:
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          CGO_LDFLAGS_ALLOW: ^-Wl,--(whole|no-whole)-archive$
        run: |
          where gcc
          go env CC CXX
          go build -x -v ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libiec61850-windows-x64
          path: libiec61850/lib/win64/*.a
          retention-days: 30

  verify-and-commit:
    name: Verify Build and Optionally Commit
    needs: [build-linux-amd64, build-linux-armv7l, build-linux-armv8, build-macos-arm64, build-macos-amd64, build-windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check commit mode
        run: |
          if [ "${{ github.event.inputs.commit_libraries }}" == "true" ]; then
            echo "::notice::Libraries WILL be committed to repository"
            echo "WILL_COMMIT=true" >> $GITHUB_ENV
          else
            echo "::notice::Libraries will NOT be committed (build and verify only)"
            echo "WILL_COMMIT=false" >> $GITHUB_ENV
          fi
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch/Ref: ${{ github.ref }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy libraries to correct locations
        run: |
          mkdir -p libiec61850/lib/linux64
          mkdir -p libiec61850/lib/linux_armv7l
          mkdir -p libiec61850/lib/linux_armv8
          mkdir -p libiec61850/lib/darwin_armv8
          mkdir -p libiec61850/lib/darwin_amd64
          mkdir -p libiec61850/lib/win64
          
          cp artifacts/libiec61850-linux64/*.a libiec61850/lib/linux64/
          cp artifacts/libiec61850-linux-armv7l/*.a libiec61850/lib/linux_armv7l/
          cp artifacts/libiec61850-linux-armv8/*.a libiec61850/lib/linux_armv8/
          cp artifacts/libiec61850-darwin-arm64/*.a libiec61850/lib/darwin_armv8/
          cp artifacts/libiec61850-darwin-x64/*.a libiec61850/lib/darwin_amd64/
          cp artifacts/libiec61850-windows-x64/*.a libiec61850/lib/win64/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify build on Linux
        run: |
          go build ./...
          echo "Build successful!"

      - name: List all libraries
        run: |
          echo "Built libraries:"
          ls -lh libiec61850/lib/*/libiec61850.a

      - name: Configure Git
        if: env.WILL_COMMIT == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit libraries
        if: env.WILL_COMMIT == 'true'
        run: |
          git add libiec61850/lib/*/*.a
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: Update libiec61850 v1.6.1 libraries for all platforms" \
                       -m "" \
                       -m "Built with:" \
                       -m "- R-GOOSE enabled" \
                       -m "- R-SMV enabled" \
                       -m "- SNTP client enabled" \
                       -m "" \
                       -m "Platforms:" \
                       -m "- Linux x86_64" \
                       -m "- Linux ARMv7l" \
                       -m "- Linux ARMv8 (ARM64)" \
                       -m "- macOS ARM64" \
                       -m "- macOS x64" \
                       -m "- Windows x64" \
                       -m "" \
                       -m "Auto-built by GitHub Actions"
            git push
          fi

      - name: Create artifact summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show commit status
          if [ "${{ env.WILL_COMMIT }}" == "true" ]; then
            echo "## ✅ Libraries Committed to Repository" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 📦 Libraries Built (Not Committed)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note:** Libraries were built and verified but not committed to the repository." >> $GITHUB_STEP_SUMMARY
            echo "> To commit libraries, manually trigger this workflow with 'Commit built libraries' enabled." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Built Libraries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x86_64 | $(du -h libiec61850/lib/linux64/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux ARMv7l | $(du -h libiec61850/lib/linux_armv7l/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux ARMv8 | $(du -h libiec61850/lib/linux_armv8/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM64 | $(du -h libiec61850/lib/darwin_armv8/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64 | $(du -h libiec61850/lib/darwin_amd64/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | $(du -h libiec61850/lib/win64/libiec61850.a | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- libiec61850: v1.6.1" >> $GITHUB_STEP_SUMMARY
          echo "- R-GOOSE: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- R-SMV: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- SNTP Client: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
