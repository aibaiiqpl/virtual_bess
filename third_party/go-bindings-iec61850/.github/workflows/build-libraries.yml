          cp /tmp/libiec61850/build/hal/libhal.a libiec61850/lib/darwin_amd64/
          cp /tmp/mbedtls/build/library/libmbedtls.a libiec61850/lib/darwin_amd64/
          cp /tmp/mbedtls/build/library/libmbedx509.a libiec61850/lib/darwin_amd64/
          cp /tmp/mbedtls/build/library/libmbedcrypto.a libiec61850/lib/darwin_amd64/

      - name: Verify library
        run: |
          file libiec61850/lib/darwin_amd64/libiec61850.a
