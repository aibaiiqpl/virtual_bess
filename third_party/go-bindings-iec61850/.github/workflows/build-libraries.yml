      - name: Debug - Check libraries and symbols
        run: |
          echo "=== Library files ==="
          ls -lh libiec61850/lib/darwin_amd64/
          echo ""
          echo "=== Check for TLS symbols in libiec61850.a ==="
          nm libiec61850/lib/darwin_amd64/libiec61850.a | grep -i tls || echo "No TLS symbols found!"
          echo ""
          echo "=== Check config_darwin_amd64.go LDFLAGS ==="
          grep -A 10 'LDFLAGS' config_darwin_amd64.go || echo "config_darwin_amd64.go not found - will use fallback config"
          echo ""
          echo "=== CMake cache for TLS/MBEDTLS ==="
          grep -i 'mbedtls\|tls' /tmp/libiec61850/build/CMakeCache.txt || echo "No mbedtls entries in CMakeCache"

      - name: Test Go build
        run: |
