name: Build libiec61850 Libraries

# Workflow Behavior:
# - Push to any branch: Builds libraries but does NOT commit them
# - Manual trigger: Builds libraries and commits ONLY if 'commit_libraries' is set to true
# - Artifacts are always uploaded for download regardless of commit setting

on:
  workflow_dispatch:
    inputs:
      commit_libraries:
        description: 'Commit built libraries to repository'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
      - main

env:
  LIBIEC61850_VERSION: v1.6.1
  ENABLE_R_GOOSE: 1
  ENABLE_R_SMV: 1
  ENABLE_SNTP: 1

jobs:
  build-linux-amd64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libmbedtls-dev

      - name: Clone libiec61850
        run: |
          git clone --depth 1 --branch ${{ env.LIBIEC61850_VERSION }} \
            https://github.com/mz-automation/libiec61850.git /tmp/libiec61850

      - name: Enable advanced features
        run: |
          cd /tmp/libiec61850
          sed -i 's/#define CONFIG_IEC61850_R_GOOSE 0/#define CONFIG_IEC61850_R_GOOSE 1/' config/stack_config.h
          sed -i 's/#define CONFIG_IEC61850_R_SMV 0/#define CONFIG_IEC61850_R_SMV 1/' config/stack_config.h
          sed -i 's/#define CONFIG_IEC61850_SNTP_CLIENT 0/#define CONFIG_IEC61850_SNTP_CLIENT 1/' config/stack_config.h
          sed -i 's/#define CONFIG_MMS_SUPPORT_TLS 0/#define CONFIG_MMS_SUPPORT_TLS 1/' config/stack_config.h

      - name: Build library
        run: |
          cd /tmp/libiec61850
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DWITH_MBEDTLS=1 \
                -DCONFIG_EXTERNAL_MBEDTLS_INCLUDE_PATH=/usr/include \
                -DMBEDTLS_INCLUDE_DIR=/usr/include \
                -DMBEDTLS_LIBRARY=/usr/lib/x86_64-linux-gnu/libmbedtls.a \
                -DMBEDX509_LIBRARY=/usr/lib/x86_64-linux-gnu/libmbedx509.a \
                -DMBEDCRYPTO_LIBRARY=/usr/lib/x86_64-linux-gnu/libmbedcrypto.a \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_PYTHON_BINDINGS=OFF \
                ..
          make -j$(nproc)

      - name: Copy library to workspace
        run: |
          mkdir -p libiec61850/lib/linux64
          cp /tmp/libiec61850/build/src/libiec61850.a libiec61850/lib/linux64/
          cp /tmp/libiec61850/build/hal/libhal.a libiec61850/lib/linux64/
          cp /usr/lib/x86_64-linux-gnu/libmbedtls.a libiec61850/lib/linux64/
          cp /usr/lib/x86_64-linux-gnu/libmbedx509.a libiec61850/lib/linux64/
          cp /usr/lib/x86_64-linux-gnu/libmbedcrypto.a libiec61850/lib/linux64/

      - name: Verify library
        run: |
          file libiec61850/lib/linux64/libiec61850.a
          ls -lh libiec61850/lib/linux64/libiec61850.a

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Debug - Check libraries and symbols
        run: |
          echo "=== Library files ==="
          ls -lh libiec61850/lib/linux64/
          echo ""
          echo "=== Check for TLS symbols in libiec61850.a ==="
          nm libiec61850/lib/linux64/libiec61850.a | grep -i tls || echo "No TLS symbols found!"
          echo ""
          echo "=== Check config_linux64.go LDFLAGS ==="
          grep -A 10 'LDFLAGS' config_linux64.go
          echo ""
          echo "=== Environment ==="
          go env

      - name: Test Go build
        run: |
          go build -v ./...
          echo "Go build successful for linux64!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libiec61850-linux64
          path: libiec61850/lib/linux64/*.a
          retention-days: 30

  build-linux-armv7l:
    name: Build Linux ARMv7l
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies and cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Install mbedtls for ARM
        run: |
          # Build mbedtls 2.28 for ARM (compatible with libiec61850 v1.6.1)
          git clone --depth 1 --branch v2.28.8 https://github.com/Mbed-TLS/mbedtls.git /tmp/mbedtls
          cd /tmp/mbedtls
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
                -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
                -DENABLE_PROGRAMS=OFF \
                -DENABLE_TESTING=OFF \
                ..
          make -j$(nproc)
          sudo make install

      - name: Clone libiec61850
        run: |
          git clone --depth 1 --branch ${{ env.LIBIEC61850_VERSION }} \
            https://github.com/mz-automation/libiec61850.git /tmp/libiec61850

      - name: Enable advanced features
        run: |
          cd /tmp/libiec61850
          sed -i 's/#define CONFIG_IEC61850_R_GOOSE 0/#define CONFIG_IEC61850_R_GOOSE 1/' config/stack_config.h
          sed -i 's/#define CONFIG_IEC61850_R_SMV 0/#define CONFIG_IEC61850_R_SMV 1/' config/stack_config.h
          sed -i 's/#define CONFIG_IEC61850_SNTP_CLIENT 0/#define CONFIG_IEC61850_SNTP_CLIENT 1/' config/stack_config.h
          sed -i 's/#define CONFIG_MMS_SUPPORT_TLS 0/#define CONFIG_MMS_SUPPORT_TLS 1/' config/stack_config.h

      - name: Create toolchain file
        run: |
          cat > /tmp/armv7l-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/arm-linux-gnueabihf)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Build library
        run: |
          cd /tmp/libiec61850
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DWITH_MBEDTLS=1 \
                -DCONFIG_EXTERNAL_MBEDTLS_INCLUDE_PATH=/tmp/mbedtls/include \
                -DCMAKE_TOOLCHAIN_FILE=/tmp/armv7l-toolchain.cmake \
                -DMBEDTLS_INCLUDE_DIR=/tmp/mbedtls/include \
                -DMBEDTLS_LIBRARY=/tmp/mbedtls/build/library/libmbedtls.a \
                -DMBEDX509_LIBRARY=/tmp/mbedtls/build/library/libmbedx509.a \
                -DMBEDCRYPTO_LIBRARY=/tmp/mbedtls/build/library/libmbedcrypto.a \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_PYTHON_BINDINGS=OFF \
                ..
          make -j$(nproc)

      - name: Copy library to workspace
        run: |
          mkdir -p libiec61850/lib/linux_armv7l
          cp /tmp/libiec61850/build/src/libiec61850.a libiec61850/lib/linux_armv7l/
          cp /tmp/libiec61850/build/hal/libhal.a libiec61850/lib/linux_armv7l/
          cp /tmp/mbedtls/build/library/libmbedtls.a libiec61850/lib/linux_armv7l/
          cp /tmp/mbedtls/build/library/libmbedx509.a libiec61850/lib/linux_armv7l/
          cp /tmp/mbedtls/build/library/libmbedcrypto.a libiec61850/lib/linux_armv7l/

      - name: Verify library
        run: |
          file libiec61850/lib/linux_armv7l/libiec61850.a
          ls -lh libiec61850/lib/linux_armv7l/libiec61850.a

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Debug - Check libraries and symbols
        run: |
          echo "=== Library files ==="
          ls -lh libiec61850/lib/linux_armv7l/
          echo ""
          echo "=== Check for TLS symbols in libiec61850.a ==="
          nm libiec61850/lib/linux_armv7l/libiec61850.a | grep -i tls || echo "No TLS symbols found!"
          echo ""
          echo "=== Check config_armv7l.go LDFLAGS ==="
          grep -A 10 'LDFLAGS' config_armv7l.go
          echo ""
          echo "=== CMake cache for TLS/MBEDTLS ==="
          grep -i 'mbedtls\|tls' /tmp/libiec61850/build/CMakeCache.txt || echo "No mbedtls entries in CMakeCache"

      - name: Test Go build (cross-compile)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
          CGO_ENABLED: 1
        run: |
          go build -v ./...
          echo "Go build successful for linux_armv7l!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libiec61850-linux-armv7l
          path: libiec61850/lib/linux_armv7l/*.a
          retention-days: 30

